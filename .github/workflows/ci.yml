name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: cowtalk_test
          POSTGRES_USER: cowtalk
          POSTGRES_PASSWORD: cowtalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cowtalk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cowtalk_test
          DB_USER: cowtalk
          DB_PASSWORD: cowtalk_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build
        run: npm run build
