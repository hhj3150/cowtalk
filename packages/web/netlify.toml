[build]
  command = "cd ../.. && npm ci && npm run build:shared && cd packages/web && npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://cowtalk-server-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
