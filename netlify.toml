[build]
  base = "packages/web"
  command = "cd ../.. && npm run build:shared && cd packages/web && npm run build"
  publish = "dist"

# 팅커벨 SSE는 Netlify Edge가 timeout HTML을 캐시하는 문제로
# Railway 직접 호출 (TinkerbellAssistant가 VITE_API_BASE_URL 사용).
# 일반 axios 호출(/api/...)은 그대로 Netlify proxy 경유.
[build.environment]
  VITE_API_BASE_URL = "https://cowtalk-server-production.up.railway.app"

[[redirects]]
  from = "/api/*"
  to = "https://cowtalk-server-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
